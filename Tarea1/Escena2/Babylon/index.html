<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Babylon.js Escena 2</title>

  <style>

    html,
    body {

      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;

    }

    #renderCanvas {

      width: 100%;
      height: 100%;
      touch-action: none;
      display: block;

    }

  </style>

</head>

<body>

<canvas id="renderCanvas"></canvas>

<!-- BABYLON -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<!-- LOADER GLB -->
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<script>

const canvas = document.getElementById("renderCanvas");

const engine = new BABYLON.Engine(
  canvas,
  true
);


// CREAR ESCENA
const createScene = function () {

  const scene = new BABYLON.Scene(engine);


  // COLOR DEL FONDO
  scene.clearColor = new BABYLON.Color3(
    0.53,
    0.81,
    0.92
  );


  // CAMARA
  const camera = new BABYLON.ArcRotateCamera(

    "camera",

    -Math.PI / 2,

    Math.PI / 2.5,

    10,

    new BABYLON.Vector3(0, 1, 0),

    scene

  );


  // CONTROLES
  camera.attachControl(canvas, true);


  // LIMITES DE ZOOM
  camera.lowerRadiusLimit = 5;

  camera.upperRadiusLimit = 30;


  // LUZ HEMISFERICA
  const hemiLight = new BABYLON.HemisphericLight(

    "hemiLight",

    new BABYLON.Vector3(0, 1, 0),

    scene

  );

  hemiLight.intensity = 1;


  // LUZ DIRECCIONAL
  const dirLight = new BABYLON.DirectionalLight(

    "dirLight",

    new BABYLON.Vector3(-1, -2, -1),

    scene

  );

  dirLight.position = new BABYLON.Vector3(
    20,
    40,
    20
  );


  // PISO
  const ground = BABYLON.MeshBuilder.CreateGround(

    "ground",

    {
      width: 40,
      height: 40
    },

    scene

  );


  // MATERIAL DEL PISO
  const groundMaterial = new BABYLON.StandardMaterial(

    "groundMaterial",

    scene

  );


  // TEXTURA
  groundMaterial.diffuseTexture =

    new BABYLON.Texture(

      "./textures/grass.jpg",

      scene

    );


  // REPETIR TEXTURA
  groundMaterial.diffuseTexture.uScale = 20;

  groundMaterial.diffuseTexture.vScale = 20;


  ground.material = groundMaterial;


  // SOMBRAS
  const shadowGenerator =

    new BABYLON.ShadowGenerator(
      1024,
      dirLight
    );


  // CARGAR ZORRO
  BABYLON.SceneLoader.ImportMesh(

    "",

    "./models/",

    "Fox.glb",

    scene,

    function(meshes, particleSystems, skeletons, animationGroups) {


      const fox = meshes[0];


      // ESCALA
      fox.scaling = new BABYLON.Vector3(
        0.02,
        0.02,
        0.02
      );


      // POSICION
      fox.position = new BABYLON.Vector3(
        0,
        0,
        0
      );


      // SOMBRAS
      meshes.forEach(mesh => {

        shadowGenerator.addShadowCaster(mesh);

      });


      // ANIMACION
      if (animationGroups.length > 0) {

        animationGroups[0].start(

          true,

          1.0,

          animationGroups[0].from,

          animationGroups[0].to,

          false

        );

      }

    }

  );


  return scene;

};


// CREAR ESCENA
const scene = createScene();


// LOOP DE RENDER
engine.runRenderLoop(function () {

  scene.render();

});


// RESIZE
window.addEventListener("resize", function () {

  engine.resize();

});

</script>

</body>
</html>
